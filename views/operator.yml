# Operator view — the whole tend queue and the state surfaces.
title: "Operator view"
audience: operator
description: >
  Everything pending, every cursor, every tracked deadline —
  the maintenance picture in one page.
blocks:
  - title: "Tend queue (all)"
    empty: "Queue clear — nothing waiting to tend."
    inbox: {}
    limit: 30
  - title: "Deadlines"
    empty: "No deadlines tracked."
    state: deadlines
  - title: "Connector cursors"
    empty: "No connectors configured."
    state: connector-cursors
  - title: "Stalest pages"
    sql: |
      SELECT path, kind, confidence, updated FROM pages
      WHERE status NOT IN ('superseded', 'archived')
      ORDER BY updated ASC, path
    limit: 10
