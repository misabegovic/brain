# Local emulation of the serving deployment — non-default host ports
# so a development brain (and any other brain on this machine) keeps
# its own 8765/8766 untouched.
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# One service per surface, same image; on a platform (Railway etc.)
# you deploy the image once per surface you want public.
services:
  ui:
    build: { context: .., dockerfile: deploy/Dockerfile }
    environment: { BRAIN_SURFACE: ui, PORT: "8080" }
    ports: ["9080:8080"]
  mcp:
    build: { context: .., dockerfile: deploy/Dockerfile }
    environment: { BRAIN_SURFACE: mcp, PORT: "8080" }
    ports: ["9081:8080"]
  datasette:
    build: { context: .., dockerfile: deploy/Dockerfile }
    environment: { BRAIN_SURFACE: datasette, PORT: "8080" }
    ports: ["9082:8080"]
